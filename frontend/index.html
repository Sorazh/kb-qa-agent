<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库问答 Agent</title>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.js">
</script>
<style>
  /* ========== Reset & Variables ========== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #22c55e;
    --bg: #f0f2f5;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #1f2937;
    --text-secondary: #6b7280;
    --text-tertiary: #9ca3af;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
    --radius: 10px;
    --radius-sm: 8px;
    --transition: .2s ease;
    --sidebar-w: 320px;
    --header-h: 60px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; }
  input { font-family: inherit; outline: none; }
  a { color: var(--primary); text-decoration: none; }

  /* ========== Layout ========== */
  #app { display: flex; height: 100vh; overflow: hidden; }

  /* --- Sidebar (Desktop) --- */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    z-index: 20;
    transition: transform var(--transition);
  }
  #sidebar-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #sidebar-header h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  #sidebar-header h2 svg { width: 20px; height: 20px; color: var(--primary); }
  .file-count {
    font-size: 12px; background: var(--bg); color: var(--text-secondary);
    padding: 2px 10px; border-radius: 999px; font-weight: 500;
  }
  #sidebar-body { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 16px; }

  /* --- File List --- */
  #file-list { display: flex; flex-direction: column; gap: 4px; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    background: var(--bg); transition: background var(--transition);
    cursor: default;
  }
  .file-item:hover { background: #e5e7eb; }
  .file-icon { flex-shrink: 0; width: 18px; height: 18px; color: var(--text-tertiary); }
  .file-name {
    flex: 1; font-size: 13px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-delete {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: transparent; color: var(--text-tertiary);
    transition: all var(--transition);
  }
  .file-delete:hover { background: #fef2f2; color: var(--danger); }
  .file-delete svg { width: 15px; height: 15px; }
  .empty-files { text-align: center; padding: 24px 0; color: var(--text-tertiary); font-size: 13px; }

  /* --- Upload Area --- */
  #drop-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 20px; text-align: center; transition: all var(--transition);
    cursor: pointer; position: relative;
  }
  #drop-zone.drag-over {
    border-color: var(--primary); background: #eff6ff;
  }
  #drop-zone svg { width: 28px; height: 28px; color: var(--text-tertiary); margin-bottom: 6px; }
  #drop-zone p { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
  #drop-zone .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
  #drop-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }

  /* --- Path Input --- */
  .path-section { display: flex; flex-direction: column; gap: 8px; }
  .path-section label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .path-row { display: flex; gap: 6px; }
  .path-row input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px;
    transition: border-color var(--transition);
  }
  .path-row input:focus { border-color: var(--primary); }
  .path-row button {
    padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px;
    background: var(--primary); color: #fff; font-weight: 500;
    transition: background var(--transition); white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .path-row button:hover { background: var(--primary-hover); }
  .path-row button svg { width: 14px; height: 14px; }

  /* --- Mobile Menu Toggle --- */
  #menu-toggle {
    display: none; position: fixed; top: 12px; left: 12px; z-index: 30;
    width: 40px; height: 40px; border-radius: var(--radius-sm);
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: var(--shadow);
    align-items: center; justify-content: center;
    color: var(--text);
  }
  #menu-toggle svg { width: 20px; height: 20px; }
  #sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3);
    z-index: 15; opacity: 0; transition: opacity var(--transition);
  }

  /* ========== Chat Section ========== */
  #chat {
    flex: 1; display: flex; flex-direction: column; height: 100vh;
    min-width: 0;
  }
  #chat-header {
    height: var(--header-h); flex-shrink: 0;
    padding: 0 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; gap: 10px;
  }
  #chat-header h1 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  #chat-header h1 svg { width: 22px; height: 22px; color: var(--primary); }
  #chat-header .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); margin-left: auto;
    display: inline-block;
  }
  #chat-header .status-text { font-size: 12px; color: var(--text-tertiary); margin-left: 4px; }

  /* --- Messages --- */
  #messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg {
    max-width: min(75%, 640px);
    padding: 10px 16px; border-radius: 14px; line-height: 1.6;
    font-size: 14px; word-break: break-word;
    animation: msgIn .25s ease;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user {
    align-self: flex-end;
    background: var(--primary); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg .timestamp {
    display: block; font-size: 10px; opacity: .6; margin-top: 4px;
  }
  .msg.bot .timestamp { color: var(--text-tertiary); }
  .msg.user .timestamp { color: rgba(255,255,255,.7); }

  /* --- Typing Indicator --- */
  .typing-indicator {
    align-self: flex-start;
    display: flex; align-items: center; gap: 5px;
    padding: 12px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    border-bottom-left-radius: 4px;
  }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-tertiary); animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: .15s; }
  .typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* --- Input Area --- */
  #input-area {
    flex-shrink: 0; padding: 14px 20px; border-top: 1px solid var(--border);
    background: var(--surface); display: flex; gap: 8px; align-items: flex-end;
  }
  #input-area input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 14px; resize: none;
    transition: border-color var(--transition); min-height: 42px;
  }
  #input-area input:focus { border-color: var(--primary); }
  #send-btn {
    width: 42px; height: 42px; border-radius: var(--radius);
    background: var(--primary); color: #fff; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition);
  }
  #send-btn:hover { background: var(--primary-hover); }
  #send-btn:disabled { opacity: .5; cursor: not-allowed; }
  #send-btn svg { width: 18px; height: 18px; }

  /* ========== Toast ========== */
  #toast-container {
    position: fixed; top: 16px; right: 16px; z-index: 999;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    pointer-events: auto; padding: 10px 16px; border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    font-size: 13px; box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 8px;
    animation: slideIn .3s ease; max-width: 360px;
    border-left: 3px solid var(--primary);
  }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--danger); }
  .toast.hiding { animation: slideOut .25s ease forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }

  /* ========== Mobile ========== */
  @media (max-width: 768px) {
    #sidebar {
      position: fixed; left: 0; top: 0; width: 85vw; max-width: 340px;
      transform: translateX(-100%); box-shadow: var(--shadow-lg);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.open { display: block; opacity: 1; }
    #menu-toggle { display: flex; }
    #chat-header { padding-left: 60px; }
    .msg { max-width: 85%; }
    #toast-container { left: 16px; right: 16px; }
    .toast { max-width: 100%; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Mobile Menu Toggle -->
  <button id="menu-toggle" onclick="toggleSidebar()" aria-label="切换菜单">
    <i data-lucide="menu"></i>
  </button>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- ====== Sidebar ====== -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2><i data-lucide="folder-open"></i> 已加载文件</h2>
      <span class="file-count" id="file-count">0</span>
    </div>
    <div id="sidebar-body">
      <!-- File List -->
      <div id="file-list">
        <div class="empty-files">暂无加载的文件</div>
      </div>

      <!-- Upload Area -->
      <div id="drop-zone">
        <i data-lucide="upload"></i>
        <p>拖拽文件到此处<br>或点击选择文件</p>
        <p class="hint">支持 .txt .pdf .docx</p>
        <input type="file" id="file-input" accept=".txt,.pdf,.docx" multiple>
      </div>

      <!-- Path Input -->
      <div class="path-section">
        <label>或输入文件路径</label>
        <div class="path-row">
          <input type="text" id="path-input" placeholder="/绝对/路径/文件.txt" onkeypress="if(event.key==='Enter') loadByPath()">
          <button onclick="loadByPath()">
            <i data-lucide="file-plus"></i> 加载
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- ====== Chat Section ====== -->
  <div id="chat">
    <div id="chat-header">
      <h1><i data-lucide="bot"></i> 知识库问答</h1>
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">就绪</span>
    </div>

    <div id="messages">
      <div class="msg bot">
        你好！我是知识库问答助手。请先上传文档到知识库，然后就可以向我提问了。
        <span class="timestamp">就绪</span>
      </div>
    </div>

    <div id="input-area">
      <input type="text" id="msg-input" placeholder="输入你的问题..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button id="send-btn" onclick="sendMessage()">
        <i data-lucide="send"></i>
      </button>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script>
// ============================================================
//  配置
// ============================================================
// 自动检测：file:// 用绝对地址，HTTP 用相对地址
const API_BASE = window.location.protocol === 'file:'
  ? 'http://127.0.0.1:8000'
  : '';
let sessionId = 'session_' + Date.now();

// ============================================================
//  Toast 通知系统
// ============================================================
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 250);
  }, 3000);
}

// ============================================================
//  图标初始化（Lucide）
// ============================================================
function initIcons() {
  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons();
  }
}

// ============================================================
//  侧边栏切换（移动端）
// ============================================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

// ============================================================
//  文件管理
// ============================================================

/** 刷新文件列表 */
async function refreshFiles() {
  try {
    const res = await fetch(API_BASE + '/api/status');
    if (!res.ok) throw new Error('请求失败');
    const data = await res.json();
    renderFiles(data.loaded_files || []);
  } catch (e) {
    showToast('❌ 无法连接后端，请确认服务器已启动', 'error');
    document.getElementById('file-count').textContent = '?';
  }
}

/** 渲染文件列表 */
function renderFiles(files) {
  const list = document.getElementById('file-list');
  const count = document.getElementById('file-count');
  count.textContent = files.length;

  if (!files.length) {
    list.innerHTML = '<div class="empty-files">暂无加载的文件</div>';
    return;
  }

  list.innerHTML = files.map(f => {
    const name = f.replace(/\\/g, '/').split('/').pop();
    const filepath = f.replace(/\\/g, '/');
    return '<div class="file-item">'
      + '<i data-lucide="file-text" class="file-icon"></i>'
      + '<span class="file-name" title="' + escapeHtml(f) + '">' + escapeHtml(name) + '</span>'
      + '<button class="file-delete" onclick="removeFile(\'' + escapeJsStr(filepath) + '\')" title="删除" aria-label="删除">'
      + '<i data-lucide="trash-2"></i>'
      + '</button>'
      + '</div>';
  }).join('');

  initIcons();
}

/** HTML 转义 */
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

/** JS 字符串转义 */
function escapeJsStr(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
}

// ============================================================
//  文件上传（拖拽 + 选择）
// ============================================================

/** 上传文件到服务器 */
async function uploadFiles(fileList) {
  if (!fileList || fileList.length === 0) return;

  for (const file of fileList) {
    const formData = new FormData();
    formData.append('file', file);

    try {
      showToast('正在上传 ' + file.name + '...', 'info');
      const res = await fetch(API_BASE + '/api/upload', {
        method: 'POST',
        body: formData,
      });
      if (!res.ok) throw new Error('上传失败');
      const data = await res.json();
      showToast('✅ ' + (data.result || '上传成功'), data.result && data.result.includes('失败') ? 'error' : 'success');
    } catch (e) {
      showToast('❌ 上传 ' + file.name + ' 失败: ' + e.message, 'error');
    }
  }
  await refreshFiles();
}

// 文件选择上传
document.getElementById('file-input').addEventListener('change', async function() {
  await uploadFiles(this.files);
  this.value = '';
});

// 拖拽上传
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', (e) => {
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.remove('drag-over');
  await uploadFiles(e.dataTransfer.files);
});

// ============================================================
//  路径加载
// ============================================================
async function loadByPath() {
  const input = document.getElementById('path-input');
  const filepath = input.value.trim();
  if (!filepath) { showToast('请输入文件路径', 'error'); return; }

  try {
    showToast('正在加载文件...', 'info');
    const res = await fetch(API_BASE + '/api/load', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filepath }),
    });
    if (!res.ok) throw new Error('请求失败');
    const data = await res.json();
    showToast(data.result || '加载成功', data.result && data.result.includes('失败') ? 'error' : 'success');
    input.value = '';
    await refreshFiles();
  } catch (e) {
    showToast('❌ 加载失败: ' + e.message, 'error');
  }
}

// ============================================================
//  删除文件
// ============================================================
async function removeFile(filepath) {
  try {
    const res = await fetch(API_BASE + '/api/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filepath }),
    });
    if (!res.ok) throw new Error('请求失败');
    const data = await res.json();
    showToast(data.result || '删除成功', data.result && data.result.includes('失败') ? 'error' : 'success');
    await refreshFiles();
  } catch (e) {
    showToast('❌ 删除失败: ' + e.message, 'error');
  }
}

// ============================================================
//  聊天
// ============================================================

/** 添加消息到聊天区域 */
function addMessage(text, role, timestamp) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;

  if (timestamp) {
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = timestamp;
    div.appendChild(ts);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

/** 打字机效果显示消息 */
async function typeMessage(text, role, timestamp) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  container.appendChild(div);

  // 逐字显示
  for (let i = 0; i < text.length; i++) {
    div.textContent = text.substring(0, i + 1);
    container.scrollTop = container.scrollHeight;
    await new Promise(r => setTimeout(r, 20));
  }

  if (timestamp) {
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.textContent = timestamp;
    div.appendChild(ts);
  }
  container.scrollTop = container.scrollHeight;
}

/** 显示/隐藏打字中指示器 */
function showTyping(show) {
  const existing = document.querySelector('.typing-indicator');
  if (existing) existing.remove();

  if (show) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }
}

/** 格式化时间 */
function formatTime() {
  const now = new Date();
  return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
}

/** 更新连接状态 */
function setStatus(online) {
  const dot = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.style.background = online ? 'var(--success)' : 'var(--danger)';
  text.textContent = online ? '已连接' : '未连接';
}

/** 发送消息 */
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const msg = input.value.trim();
  if (!msg) return;

  // 显示用户消息
  addMessage(msg, 'user', formatTime());
  input.value = '';
  document.getElementById('send-btn').disabled = true;

  // 显示打字指示
  showTyping(true);
  setStatus(true);

  try {
    const res = await fetch(API_BASE + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, session_id: sessionId }),
    });
    if (!res.ok) throw new Error('请求失败');
    const data = await res.json();

    showTyping(false);
    const answer = data.answer || '(无响应)';
    await typeMessage(answer, 'bot', formatTime());
  } catch (e) {
    showTyping(false);
    addMessage('⚠️ 网络错误: ' + e.message, 'bot', formatTime());
    setStatus(false);
  } finally {
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

// ============================================================
//  初始化
// ============================================================
refreshFiles();
initIcons();
</script>
</body>
</html>
